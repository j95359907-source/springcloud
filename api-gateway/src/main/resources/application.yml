# =========================
# api-gateway 本地最小启动 + 兜底配置
# 配置中心正常时，主要配置来自 config-repo/api-gateway.yml。
# 配置中心没启动时，这里至少提供数据库、Redis、注册中心等基础配置。
# =========================

server:
  port: 9000

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:mysql://localhost:3306/school_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

jwt:
  secret: school-demo-jwt-secret-key-change-me-2026
  expire-minutes: 120

gateway:
  rate-limit:
    window-seconds: 10
    max-requests: 40
    student-max-requests: 60
    teacher-max-requests: 50
    class-max-requests: 40
    public-max-requests: 20
  access-control:
    enabled: true
    protected-prefixes:
      - /actuator
      - /admin
    allow-ip-prefixes:
      - 127.0.0.1
      - ::1
      - 192.168.
      - 10.
      - 172.
