# =========================
# student-service 本地兜底配置
# 配置中心正常时，优先使用 config-repo/student-service.yml。
# 配置中心没启动时，这里保证服务仍能拿到端口、数据库和注册中心配置。
# =========================

server:
  port: 9011

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/school_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
