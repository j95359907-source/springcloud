# =========================
# api-gateway 远程配置
# 由 config-server 读取并下发给网关。
# =========================

server:
  port: 9000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/school_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s
  cloud:
    gateway:
      discovery:
        locator:
          # 关闭自动路由，使用 GatewayRouteConfig 中的 Java 路由，便于阅读和面试讲解。
          enabled: false
      httpclient:
        connect-timeout: 3000
        response-timeout: 8s
      # 暂时不配置 default-filters 和 globalcors。
      # 原因：当前 500 来自 ReadOnlyHttpHeaders，先关闭框架级响应头改写，保证主链路跑通。
    loadbalancer:
      retry:
        enabled: true

gateway:
  rate-limit:
    window-seconds: 10
    max-requests: 40
    student-max-requests: 60
    teacher-max-requests: 50
    class-max-requests: 40
    public-max-requests: 20
  access-control:
    enabled: true
    protected-prefixes:
      - /actuator
      - /admin
    allow-ip-prefixes:
      - 127.0.0.1
      - ::1
      - 192.168.
      - 10.
      - 172.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      classCircuit:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      classCircuit:
        timeoutDuration: 3s

jwt:
  secret: school-demo-jwt-secret-key-change-me-2026
  expire-minutes: 120

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: INFO
    reactor.netty.http.client: WARN
